stages:
  - build-docker-image

docker build tag:
  stage: build-docker-image
  needs: []
  image: docker:stable
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+/' # Only on semver tags.
  script:
    - DOCKER_IMAGE_TAG=ci.tno.nl/tke/knowledge-mapper:$CI_COMMIT_TAG
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN ci.tno.nl
    - docker build --pull . -t $DOCKER_IMAGE_TAG
    - docker push $DOCKER_IMAGE_TAG
    - docker image rm -f $DOCKER_IMAGE_TAG

docker build latest:
  stage: build-docker-image
  needs: []
  image: docker:stable
  rules:
    - if: '$CI_COMMIT_REF_NAME == main' # Only on main branch
  script:
    - DOCKER_IMAGE_TAG=ci.tno.nl/tke/knowledge-mapper:latest
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN ci.tno.nl
    - docker build --pull . -t $DOCKER_IMAGE_TAG
    - docker push $DOCKER_IMAGE_TAG
    - docker image rm -f $DOCKER_IMAGE_TAG
