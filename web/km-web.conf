server {
  listen 80;

  location / {
    autoindex on;
    alias /var/www/km-web/;
    # This makes it so that if a page is requested that is actually a route in
    # the frontend, that the index page is loaded.
    try_files $uri $uri/ /index.html;
  }

  location /km/ {
    proxy_pass http://km-api:8000/km/;
    proxy_set_header Host $host:8000;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
