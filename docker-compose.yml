services:
  knowledge-engine:
    image: ghcr.io/tno/knowledge-engine/smart-connector:1.1.3
  knowledge-mapper:
    build: ./mapper
    entrypoint: [ "python", "-m", "knowledge_mapper", "ignored", "--wizard" ]
    environment:
      - KM_API=http://km-api:8000/km
      - KE_API=http://knowledge-engine:8280/rest
    depends_on:
      - km-api
  km-api:
    build: ./api
    env_file:
      - km-api.env
    environment:
      KE_ENDPOINT: http://knowledge-engine:8280/rest
    # TODO: Persist data in volume
    depends_on:
      - knowledge-engine
  data-user-1:
    build: ./data-user
    environment:
      KE_API: http://knowledge-engine:8280/rest
      KB_ID: http://example.org/data-user-1
      KB_NAME: Data User 1
      KB_DESCRIPTION: Example KB that wants to use data (1)
      GRAPH_PATTERN_PREFIXES: |
        { "ex": "http://example.org/" }
      GRAPH_PATTERN: |
        ?a ex:predicate-1 ?b .
  web:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - km-api
